
services:
  db:
    image: mysql:8.0
    container_name: rental_mysql_db
    restart: always

    environment:
      MYSQL_DATABASE: rental_db
      MYSQL_USER: rental_user
      MYSQL_PASSWORD: rental_password
      MYSQL_ROOT_PASSWORD: root_password

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10


  web:
    build: .
    container_name: rental_django_app

    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      DB_HOST: db


volumes:
  mysql_data: